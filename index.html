<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lonelyroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="world" id="home">
    <header class="topbar">
      <button class="brand" type="button" data-room-target="home">Lonelyroom</button>
      <nav class="room-nav" aria-label="Комнаты Lonelyroom">
        <button class="nav-pill is-active" type="button" data-room-target="home">дом</button>
        <button class="nav-pill" type="button" data-room-target="books">библиотека</button>
        <button class="nav-pill" type="button" data-room-target="anime">аниме</button>
        <button class="nav-pill" type="button" data-room-target="music">музыка</button>
        <button class="nav-pill" type="button" data-room-target="blog">блог</button>
        <button class="nav-pill" type="button" data-room-target="friends">друзья</button>
      </nav>
    </header>

    <section class="house-shell" data-active-room="home" aria-labelledby="home-title">
      <div class="room-stage">
        <article class="room-scene is-active" data-room="home">
          <img class="room-art" src="assets/lonelyroom-home-hall.png" alt="Центральный коридор дома Lonelyroom с тёплым светом, дождём за окном и входом в уютный дом.">
          <div class="door-map" aria-label="Двери в комнаты">
            <button class="door-entry entry-books" type="button" data-room-target="books">библиотека</button>
            <button class="door-entry entry-anime" type="button" data-room-target="anime">аниме</button>
            <button class="door-entry entry-music" type="button" data-room-target="music">музыка</button>
            <button class="door-entry entry-blog" type="button" data-room-target="blog">блог</button>
            <button class="door-entry entry-friends" type="button" data-room-target="friends">друзья</button>
          </div>
        </article>

        <article class="room-scene" data-room="books">
          <img class="room-art" src="assets/lonelyroom-books-room.png" alt="Библиотека Lonelyroom с книжными шкафами до потолка, креслом, пледом, лампой и стопками книг.">
        </article>

        <article class="room-scene" data-room="anime">
          <img class="room-art" src="assets/lonelyroom-anime-room.png" alt="Аниме-комната Lonelyroom с экраном, мангой, фигурками, подушками и фиолетово-синей подсветкой.">
        </article>

        <article class="room-scene" data-room="music">
          <img class="room-art" src="assets/lonelyroom-music-room.png" alt="Музыкальная комната Lonelyroom с виниловым проигрывателем, кассетами, колонками, наушниками и оранжевым светом.">
        </article>

        <article class="room-scene" data-room="blog">
          <img class="room-art" src="assets/lonelyroom-blog-room.png" alt="Кабинет Lonelyroom для блога с письменным столом, ноутбуком, заметками, фотографиями и настольной лампой.">
        </article>

        <article class="room-scene" data-room="friends">
          <img class="room-art" src="assets/lonelyroom-friends-room.png" alt="Гостиная друзей Lonelyroom с диваном, чайным столиком, пледами, подушками и атмосферой общения.">
        </article>
      </div>

      <div class="rain-layer" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="lamp-glow" aria-hidden="true"></div>

      <div class="transition-curtain" aria-hidden="true"></div>

      <div class="character" id="character" data-character-state="lookingWindow" aria-hidden="true">
        <img class="character-frame" data-character-frame="reading" src="assets/lonelyroom-character-reading.png" alt="">
        <img class="character-frame" data-character-frame="tea" src="assets/lonelyroom-character-tea.png" alt="">
        <img class="character-frame" data-character-frame="laptop" src="assets/lonelyroom-character-laptop.png" alt="">
        <img class="character-frame is-active" data-character-frame="lookingWindow" src="assets/lonelyroom-character-window.png" alt="">
      </div>

      <div class="title-card">
        <p>добро пожаловать домой</p>
        <h1 id="home-title">Lonelyroom</h1>
      </div>

      <div class="room-label" aria-live="polite">
        <span id="room-kicker">сейчас</span>
        <strong id="room-name">дом</strong>
      </div>

      <time class="room-clock" id="room-clock" datetime="">--:--</time>

      <form class="note-pad" id="note-form" aria-label="Оставить записку в комнате">
        <label for="note-text">записка</label>
        <div class="note-row">
          <input id="note-text" type="text" maxlength="64" placeholder="оставить что-то тёплое">
          <button type="submit">♡</button>
        </div>
      </form>

      <div class="house-notes" id="house-notes" aria-label="Записки пользователей">
        <span>чай вечером</span>
        <span>дождь за окном</span>
      </div>

      <div class="tea-steam" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
