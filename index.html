<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lonelyroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="world" id="home">
    <header class="topbar">
      <button class="brand" type="button" data-focus-room="home">Lonelyroom</button>
      <nav class="room-nav" aria-label="Комнаты Lonelyroom">
        <button class="nav-pill is-active" type="button" data-focus-room="home">дом</button>
        <button class="nav-pill" type="button" data-focus-room="books">библиотека</button>
        <button class="nav-pill" type="button" data-focus-room="anime">аниме</button>
        <button class="nav-pill" type="button" data-focus-room="music">музыка</button>
        <button class="nav-pill" type="button" data-focus-room="blog">блог</button>
        <button class="nav-pill" type="button" data-focus-room="friends">друзья</button>
      </nav>
    </header>

    <section class="house-shell" aria-labelledby="home-title">
      <div class="house-camera" data-current-room="home">
        <img class="house-art" src="assets/lonelyroom-house-world.png" alt="Единая иллюстрация уютного дома Lonelyroom с библиотекой, аниме-комнатой, музыкальным уголком, кабинетом для блога, гостиной друзей, дождём за окнами, гирляндами, растениями, котом и множеством декоративных деталей.">

        <div class="rain-layer" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="fairy-lights" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="cat-breath" aria-hidden="true"></div>

        <div class="room-hotspots" aria-label="Переходы по дому">
          <button class="room-hotspot hotspot-books" type="button" data-focus-room="books">
            <span>библиотека</span>
          </button>
          <button class="room-hotspot hotspot-anime" type="button" data-focus-room="anime">
            <span>аниме</span>
          </button>
          <button class="room-hotspot hotspot-music" type="button" data-focus-room="music">
            <span>музыка</span>
          </button>
          <button class="room-hotspot hotspot-blog" type="button" data-focus-room="blog">
            <span>блог</span>
          </button>
          <button class="room-hotspot hotspot-friends" type="button" data-focus-room="friends">
            <span>друзья</span>
          </button>
        </div>

        <div class="door-glow" aria-hidden="true"></div>
      </div>

      <div class="title-card">
        <p>единый уютный дом</p>
        <h1 id="home-title">Lonelyroom</h1>
      </div>

      <div class="room-label" aria-live="polite">
        <span id="room-kicker">сейчас</span>
        <strong id="room-name">дом</strong>
      </div>

      <form class="note-pad" id="note-form" aria-label="Оставить записку в доме">
        <label for="note-text">записка</label>
        <div class="note-row">
          <input id="note-text" type="text" maxlength="64" placeholder="оставить что-то тёплое">
          <button type="submit">♡</button>
        </div>
      </form>

      <div class="house-notes" id="house-notes" aria-label="Записки пользователей">
        <span>чай вечером</span>
        <span>дождь за окном</span>
      </div>

      <button class="home-button" type="button" data-focus-room="home">показать весь дом</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
