<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lonelyroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Comfortaa:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <span class="star s1"></span>
    <span class="star s2"></span>
    <span class="star s3"></span>
    <span class="star s4"></span>
    <span class="star s5"></span>
  </div>

  <main class="world" id="home">
    <header class="topbar">
      <a class="brand" href="#home">Lonelyroom</a>
      <nav class="room-nav" aria-label="Комнаты">
        <button class="nav-pill is-active" type="button" data-open-room="home">комната</button>
        <button class="nav-pill" type="button" data-open-room="books">книги</button>
        <button class="nav-pill" type="button" data-open-room="anime">аниме</button>
        <button class="nav-pill" type="button" data-open-room="music">музыка</button>
        <button class="nav-pill" type="button" data-open-room="blog">блог</button>
        <button class="nav-pill" type="button" data-open-room="friends">друзья</button>
      </nav>
    </header>

    <section class="home-room room-panel is-active" data-room="home" aria-labelledby="home-title">
      <div class="room-shell">
        <div class="wall">
          <div class="garland" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>

          <button class="weather-window room-object" type="button" aria-label="Окно с погодой">
            <span class="tooltip">за окном тихий дождь и тёплый свет окон</span>
            <span class="curtain curtain-left"></span>
            <span class="curtain curtain-right"></span>
            <span class="moon"></span>
            <span class="city-lights"></span>
            <span class="rain r1"></span>
            <span class="rain r2"></span>
            <span class="rain r3"></span>
            <span class="window-sill">
              <span class="tiny-plant"></span>
              <span class="crystal"></span>
            </span>
          </button>

          <button class="bookshelf room-object" type="button" data-open-room="books" aria-label="Книжная полка">
            <span class="tooltip">открыть комнату книг</span>
            <span class="shelf-line top"></span>
            <span class="shelf-line mid"></span>
            <span class="book b1"></span>
            <span class="book b2"></span>
            <span class="book b3"></span>
            <span class="book b4"></span>
            <span class="book b5"></span>
            <span class="book b6"></span>
            <span class="shelf-cat"></span>
            <span class="shelf-candle"></span>
            <span class="trailing-plant"></span>
          </button>

          <div class="room-doors" aria-label="Двери в разделы">
            <button class="space-door door-books" type="button" data-open-room="books">
              <span class="door-icon" aria-hidden="true">⌑</span>
              <span>книги</span>
              <span class="door-preview shelf-preview"></span>
            </button>
            <button class="space-door door-anime" type="button" data-open-room="anime">
              <span class="door-icon" aria-hidden="true">☁</span>
              <span>аниме</span>
              <span class="door-preview sky-preview"></span>
            </button>
            <button class="space-door door-music" type="button" data-open-room="music">
              <span class="door-icon" aria-hidden="true">♪</span>
              <span>музыка</span>
              <span class="door-preview record-preview"></span>
            </button>
            <button class="space-door door-blog" type="button" data-open-room="blog">
              <span class="door-icon" aria-hidden="true">✎</span>
              <span>блог</span>
              <span class="door-preview note-preview"></span>
            </button>
            <button class="space-door door-friends" type="button" data-open-room="friends">
              <span class="door-icon" aria-hidden="true">♡</span>
              <span>друзья</span>
              <span class="door-preview friend-preview"></span>
            </button>
          </div>
        </div>

        <div class="floor">
          <div class="soft-light" aria-hidden="true"></div>
          <div class="sofa" aria-label="мягкий диван">
            <span class="pillow"></span>
            <span class="pillow round"></span>
            <span class="blanket"></span>
            <span class="sofa-arm left"></span>
            <span class="sofa-arm right"></span>
            <span class="stitch-line"></span>
          </div>

          <button class="desk room-object" type="button" aria-label="Стол для записок">
            <span class="tooltip">оставить записку</span>
            <span class="lamp"></span>
            <span class="lamp-stand"></span>
            <span class="desk-paper"></span>
            <span class="notebook"></span>
            <span class="pen"></span>
            <span class="tea"></span>
            <span class="drawer left"></span>
            <span class="drawer right"></span>
          </button>

          <button class="avatar room-object" type="button" aria-label="Персонаж пользователя">
            <span class="tooltip profile">
              <strong>ты дома</strong>
              настроение: уют<br>
              режим: вечер
            </span>
            <span class="hair"></span>
            <span class="face"></span>
            <span class="eyes"></span>
            <span class="cheeks"></span>
            <span class="body"></span>
            <span class="sleeve left"></span>
            <span class="sleeve right"></span>
            <span class="legs"></span>
          </button>

          <div class="pet" aria-label="питомец рядом">
            <span class="pet-face"></span>
            <span class="pet-paw paw-one"></span>
            <span class="pet-paw paw-two"></span>
          </div>
          <div class="plant p-left" aria-label="растение"></div>
          <div class="plant p-right" aria-label="растение"></div>
          <div class="rug" aria-hidden="true"></div>

          <form class="note-pad" id="note-form" aria-label="Оставить записку">
            <label for="note-text">записка</label>
            <div class="note-row">
              <input id="note-text" type="text" maxlength="64" placeholder="что оставить на столе?">
              <button type="submit">♡</button>
            </div>
          </form>

          <div class="table-notes" id="table-notes" aria-label="Записки на столе">
            <span>вечером чай</span>
          </div>
        </div>

        <div class="room-title">
          <p>личное пространство</p>
          <h1 id="home-title">Lonelyroom</h1>
        </div>
      </div>
    </section>

    <section class="section-room room-panel" data-room="books" aria-labelledby="books-title">
      <button class="back-home" type="button" data-open-room="home">← в комнату</button>
      <div class="section-scene books-scene">
        <div class="mini-window"></div>
        <div class="big-shelf"></div>
        <div class="reading-chair"></div>
        <div class="floating-notes">
          <span>тихая полка</span>
          <span>дождь</span>
          <span>закладка</span>
        </div>
        <h2 id="books-title">книги</h2>
      </div>
    </section>

    <section class="section-room room-panel" data-room="anime" aria-labelledby="anime-title">
      <button class="back-home" type="button" data-open-room="home">← в комнату</button>
      <div class="section-scene anime-scene">
        <div class="wide-window"></div>
        <div class="screen-glow"></div>
        <div class="floor-cushion"></div>
        <div class="tiny-mascot"></div>
        <h2 id="anime-title">аниме</h2>
      </div>
    </section>

    <section class="section-room room-panel" data-room="music" aria-labelledby="music-title">
      <button class="back-home" type="button" data-open-room="home">← в комнату</button>
      <div class="section-scene music-scene">
        <div class="record-player"></div>
        <div class="speaker left"></div>
        <div class="speaker right"></div>
        <div class="sound-waves">
          <span></span><span></span><span></span>
        </div>
        <h2 id="music-title">музыка</h2>
      </div>
    </section>

    <section class="section-room room-panel" data-room="blog" aria-labelledby="blog-title">
      <button class="back-home" type="button" data-open-room="home">← в комнату</button>
      <div class="section-scene blog-scene">
        <div class="writing-desk"></div>
        <div class="paper-stack"></div>
        <div class="wall-calendar"></div>
        <div class="soft-plant"></div>
        <h2 id="blog-title">блог</h2>
      </div>
    </section>

    <section class="section-room room-panel" data-room="friends" aria-labelledby="friends-title">
      <button class="back-home" type="button" data-open-room="home">← в комнату</button>
      <div class="section-scene friends-scene">
        <div class="friend-window"></div>
        <div class="friend-bed"></div>
        <div class="friend-desk"></div>
        <div class="friend-avatar"></div>
        <div class="friend-pet"></div>
        <div class="friend-posters">
          <span>привет</span>
          <span>вечер</span>
          <span>чай?</span>
        </div>
        <h2 id="friends-title">друзья</h2>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
